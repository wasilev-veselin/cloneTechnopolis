<section aria-label="Покупка">
  <div>
    <ts-price-tag
      [amount]="price().current.amount"
      [currencyCode]="price().current.currencyCode"
    />
    <ts-stock-badge [status]="availabilityStatus()" />
  </div>

  <p>
    Наличност:
    @if (quantity() === null) {
      не е посочено
    } @else {
      {{ quantity() }}
    }
  </p>

  <ts-button [disabled]="!canAddToCart()" (click)="addToCart.emit()">
    Добави в количката
  </ts-button>
</section>
