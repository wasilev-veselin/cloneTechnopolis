<section aria-label="Покупка">
  <div>
    <ts-price-tag
      [amount]="price().current.amount"
      [currencyCode]="price().current.currencyCode"
    />
    <ts-stock-badge [status]="stockStatus()" />
  </div>

  <p>Количество: {{ quantity() }}</p>

  <ts-button (click)="addToCart.emit()">Добави в количката</ts-button>
</section>
