@let i = item();
<article>
  @if (i.imageUrl) {
    <img [src]="i.imageUrl" [alt]="i.title" />
  }
  <div>
    <p>{{ i.brand }}</p>
    <h3>{{ i.title }}</h3>
    <span>Количество: {{ i.quantity }}</span>
  </div>
  <ts-price-tag
    [amount]="i.unitPrice.amount * i.quantity"
    [currencyCode]="i.unitPrice.currencyCode"
  />
  <button type="button" (click)="remove.emit(i.sku)">Премахни</button>
</article>
