<aside>
  <h2>Обобщение</h2>
  <div>
    <span>Продукти</span>
    <strong>{{ summary().totalQuantity }}</strong>
  </div>
  <div>
    <span>Междинна сума</span>
    @if (summary().subtotal; as subtotal) {
      <ts-price-tag
        [amount]="subtotal.amount"
        [currencyCode]="subtotal.currencyCode"
      />
    }
  </div>
  <a routerLink="/bg/checkout/shipping">
    <ts-button>Към поръчка</ts-button>
  </a>
</aside>
