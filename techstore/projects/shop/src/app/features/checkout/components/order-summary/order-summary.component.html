<aside>
  <h2>Поръчка</h2>
  <div>
    <span>Продукти</span>
    <strong>{{ cartStore.totalQuantity() }}</strong>
  </div>
  <div>
    <span>Сума</span>
    @if (cartStore.subtotal(); as subtotal) {
      <ts-price-tag
        [amount]="subtotal.amount"
        [currencyCode]="subtotal.currencyCode"
      />
    }
  </div>
</aside>
