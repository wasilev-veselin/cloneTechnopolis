<header class="topbar">
  <a class="brand" routerLink="/bg/catalog/all" aria-label="Techstore начало">
    <span class="brand-mark">TS</span>
    <span>Techstore</span>
  </a>

  <nav aria-label="Основна навигация">
    <a routerLink="/bg/catalog/all" routerLinkActive="active">Каталог</a>
    <form class="search-form" role="search" (submit)="search($event, searchInput.value)">
      <input
        #searchInput
        type="search"
        name="q"
        placeholder="Търсене"
        aria-label="Търсене"
      />
      <button type="submit">Търси</button>
    </form>
  </nav>

  <a class="cart-link" routerLink="/bg/cart" aria-label="Количка">
    Количка
    <span>{{ cartStore.totalQuantity() }}</span>
  </a>
</header>
